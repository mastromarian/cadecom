<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CADECOM — Variaciones del mes</title>
<script src="data.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f3f8; color: #1a1a2e; font-size: 13px; }

/* HEADER */
header {
  background: linear-gradient(135deg, #1F3864 0%, #2E5FA3 100%);
  color: #fff; padding: 8px 28px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 15px; font-weight: 700; }
header p  { font-size: 11px; opacity: .8; margin-top: 1px; }
.badge { background: rgba(255,255,255,.15); border-radius: 20px; padding: 5px 14px; font-size: 12px; }

/* NAV */
.nav-bar {
  background: #e4e9f2; border-bottom: 2px solid #c8d0e0;
  padding: 0 28px; display: flex; gap: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  position: sticky; top: 0; z-index: 99;
}
.nav-item {
  display: inline-flex; align-items: center;
  padding: 6px 16px; font-size: 12px; font-weight: 600; color: #555;
  text-decoration: none; white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: color .15s, border-color .15s; margin-bottom: -2px;
}
.nav-item:hover { color: #2E5FA3; border-bottom-color: #9DC3E6; }
.nav-item.active { color: #1F3864; border-bottom-color: #2E5FA3; }
.nav-item.disabled { color: #bbb; cursor: default; pointer-events: none; }

/* FILTERS BAR */
.filters-bar {
  background: #fff; border-bottom: 1px solid #dde3ee;
  padding: 8px 20px;
  display: flex; flex-wrap: nowrap; gap: 8px; align-items: flex-end;
  box-shadow: 0 2px 6px rgba(0,0,0,.08); overflow-x: auto;
  position: sticky; top: 0; z-index: 98;
}
.filter-group { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex-shrink: 0; }
.filter-group label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #888; font-weight: 600; white-space: nowrap; }
.filter-group select, .filter-group input:not([type=checkbox]) {
  border: 1px solid #ccd5e8; border-radius: 6px; padding: 5px 8px;
  font-size: 12px; background: #f7f9fd; color: #1F3864; outline: none;
  cursor: pointer; min-width: 0;
}
.filter-group select:focus { border-color: #2E5FA3; background: #fff; }
.btn-reset {
  background: #1F3864; color: #fff; border: none; border-radius: 6px;
  padding: 5px 14px; font-size: 12px; cursor: pointer; align-self: flex-end;
  transition: background .15s; white-space: nowrap; flex-shrink: 0;
}
.btn-reset:hover { background: #2E5FA3; }

/* MULTISELECT */
.ms-wrap { position: relative; width: 130px; flex-shrink: 0; }
.ms-trigger {
  border: 1px solid #ccd5e8; border-radius: 6px; padding: 5px 24px 5px 8px;
  font-size: 12px; background: #f7f9fd; color: #1F3864;
  cursor: pointer; user-select: none; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; min-height: 29px;
  display: flex; align-items: center; position: relative;
}
.ms-trigger::after { content: '▾'; position: absolute; right: 9px; top: 50%; transform: translateY(-50%); font-size: 11px; color: #888; }
.ms-trigger.open { border-color: #2E5FA3; background: #fff; }
.ms-dropdown {
  display: none; position: fixed;
  background: #fff; border: 1px solid #ccd5e8; border-radius: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,.12); z-index: 9999;
  min-width: 180px; max-height: 220px; overflow-y: auto;
}
.ms-dropdown.open { display: block; }
.ms-search { padding: 5px 8px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; }
.ms-search input { width: 100%; border: 1px solid #dde3ee; border-radius: 4px; padding: 5px 8px; font-size: 12px; outline: none; }
.ms-search input:focus { border-color: #2E5FA3; }
.ms-actions { padding: 4px 8px; border-bottom: 1px solid #eee; display: flex; gap: 8px; position: sticky; top: 41px; background: #fff; }
.ms-actions button { font-size: 11px; color: #2E5FA3; background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }
.ms-list { padding: 2px 0; }
.ms-item { display: flex; align-items: center; justify-content: flex-start; gap: 6px; width: 100%; box-sizing: border-box; padding: 3px 10px; cursor: pointer; font-size: 11px; white-space: nowrap; }
.ms-item:hover { background: #f0f3f8; }
.ms-item input[type=checkbox] { width: 12px; height: 12px; margin: 0; padding: 0; accent-color: #2E5FA3; flex-shrink: 0; cursor: pointer; }
.ms-item span { text-align: left; }
.ms-count { display: inline-block; background: #2E5FA3; color: #fff; border-radius: 10px; font-size: 10px; padding: 1px 6px; margin-left: 4px; }

/* Filtros deshabilitados */
select:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: #f0f0f0 !important;
}

/* MAIN */
.main { max-width: 100%; margin: 0 auto; padding: 16px 20px; }

/* CARDS */
.card { background: #fff; border-radius: 10px; padding: 18px 22px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 20px; }
.card h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #1F3864; margin-bottom: 14px; }
.tbl-wrap { overflow-x: hidden; }
table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
thead th {
  background: #1F3864; color: #fff; padding: 6px 8px;
  text-align: right; font-weight: 600; font-size: 13px;
  text-transform: none; letter-spacing: 0; white-space: nowrap;
  position: sticky; top: 0; z-index: 1;
}
thead th:first-child { text-align: center; }
thead th:nth-child(2), thead th:nth-child(3) { text-align: left; }
tbody tr:nth-child(even) { background: #f5f7fc; }
tbody tr:hover { background: #e8edf8; }
tbody td { padding: 5px 8px; text-align: right; border-bottom: 1px solid #eee; white-space: nowrap; }
.neg { color: #e74c3c; font-weight: 600; }
.pos { color: #27ae60; font-weight: 600; }
.total-row td { background: #d9e1f2 !important; font-weight: 700; border-top: 2px solid #2E5FA3; }
/* Column resize handle */
thead th { position: relative; }
.col-resizer {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 5px; cursor: col-resize; z-index: 2;
  user-select: none;
}
.col-resizer:hover, .col-resizer.resizing { background: rgba(255,255,255,.4); }

tr[style*="fde8c8"] td { background: #fde8c8 !important; }

/* Column resize */
thead th { position: relative; user-select: none; }
.col-resize { position: absolute; right: 0; top: 0; bottom: 0; width: 8px; cursor: col-resize; background: transparent; }
.col-resize:hover { background: rgba(255,255,255,.3); }


/* TOGGLE */
.btn-toggle {
  border: 1.5px solid #2E5FA3; background: #fff; color: #2E5FA3;
  border-radius: 6px; padding: 5px 14px; font-size: 12px; cursor: pointer; transition: all .15s;
}
.btn-toggle.active { background: #2E5FA3; color: #fff; }
</style>
</head>

<script>
// Lista completa de meses (viene en data.js); la historia se carga en diferido
const MONTHS = ALL_MONTHS;
const MONTH_LABELS = MONTHS.map(m => { const [mm, yyyy] = m.split('-'); return yyyy + '.' + mm; });

// --- Multiselect ---
const msState = { marca: new Set(), modelo: new Set() };
const msAllItems = { marca: [], modelo: [] };

function buildMsList(key, items) {
  msAllItems[key] = items;
  const list = document.getElementById(`ms-${key}-list`);
  if (!list) {
    console.error(`[buildMsList] ERROR: ms-${key}-list element not found!`);
    return;
  }
  const html = items.map(v =>
    `<label class="ms-item"><input type="checkbox" value="${v}" onchange="onMsChange('${key}',this.value,this.checked)" ${msState[key].has(v)?'checked':''}><span>${v}</span></label>`
  ).join('');
  list.innerHTML = html;
}
function filterMsList(key, q) {
  const items = msAllItems[key].filter(v => v.toLowerCase().includes(q.toLowerCase()));
  document.getElementById(`ms-${key}-list`).innerHTML = items.map(v =>
    `<label class="ms-item"><input type="checkbox" value="${v}" onchange="onMsChange('${key}',this.value,this.checked)" ${msState[key].has(v)?'checked':''}><span>${v}</span></label>`
  ).join('');
}
function onMsChange(key, value, checked) {
  if (checked) msState[key].add(value); else msState[key].delete(value);
  updateMsTrigger(key); populateModelos(); updateInsights();
}
function updateMsTrigger(key) {
  const trigger = document.getElementById(`ms-${key}-trigger`);
  const n = msState[key].size;
  if (n === 0) trigger.innerHTML = 'Todas';
  else if (n === 1) trigger.innerHTML = [...msState[key]][0];
  else {
    const label = key === 'marca' ? 'marcas' : 'modelos';
    trigger.innerHTML = `${n} ${label} <span class="ms-count">${n}</span>`;
  }
}
function selectAllMs(key) {
  document.querySelectorAll(`#ms-${key}-list input`).forEach(c => { c.checked = true; msState[key].add(c.value); });
  updateMsTrigger(key); populateModelos(); updateInsights();
}
function clearMs(key) {
  msState[key].clear();
  document.querySelectorAll(`#ms-${key}-list input`).forEach(c => c.checked = false);
  updateMsTrigger(key); populateModelos(); updateInsights();
}
function toggleMs(key, event) {
  event && event.stopPropagation();
  const drop = document.getElementById(`ms-${key}-drop`);
  const trigger = document.getElementById(`ms-${key}-trigger`);
  const isOpen = drop.classList.contains('open');
  document.querySelectorAll('.ms-dropdown.open').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.ms-trigger.open').forEach(t => t.classList.remove('open'));
  if (!isOpen) {
    const rect = trigger.getBoundingClientRect();
    drop.style.top  = (rect.bottom + 4) + 'px';
    drop.style.left = rect.left + 'px';
    drop.classList.add('open');
    trigger.classList.add('open');
  }
}
document.addEventListener('click', e => {
  if (!e.target.closest('.ms-wrap')) {
    document.querySelectorAll('.ms-dropdown.open').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.ms-trigger.open').forEach(t => t.classList.remove('open'));
  }
});

function getFiltered() {
  const cil       = document.getElementById('f-cil').value;
  const zona       = document.getElementById('f-zona').value;
  const provincia = document.getElementById('f-provincia').value;
  const localidad = document.getElementById('f-localidad').value;

  return RAW_DATA.filter(r =>
    (msState.marca.size === 0 || msState.marca.has(r.marca)) &&
    (msState.modelo.size === 0 || msState.modelo.has(r.modelo)) &&
    (!cil       || r.cilindrada === cil) &&
    (!zona      || r.zona === zona) &&
    (!provincia || r.provincia === provincia) &&
    (!localidad || r.localidad === localidad)
  );
}

// Filtro GLOBAL: solo marca/cilindrada/modelo, SIN filtros geográficos
function getFilteredGlobal() {
  const cil    = document.getElementById('f-cil').value;

  return RAW_DATA.filter(r =>
    (msState.marca.size === 0 || msState.marca.has(r.marca)) &&
    (msState.modelo.size === 0 || msState.modelo.has(r.modelo)) &&
    (!cil    || r.cilindrada === cil)
  );
}

function initFilters() {
  const marcas = [...new Set(RAW_DATA.map(r => r.marca))].sort();
  buildMsList('marca', marcas);
  const cats = [...new Set(RAW_DATA.map(r => r.cilindrada).filter(c => c && c !== 'Sin categoría'))].sort();
  cats.push('Sin categoría');
  const selCil = document.getElementById('f-cil');
  selCil.innerHTML = '<option value="">Todas</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
  
  // Geographic filters - secuencial
  // Zona: siempre habilitada
  const allZonas = Object.keys(ZONA_LOCALIDADES).sort();
  const selZona = document.getElementById('f-zona');
  selZona.innerHTML = '<option value="">Todas</option>' + allZonas.map(z => `<option value="${z}">${z}</option>`).join('');

  // Provincia: deshabilitada hasta que se seleccione Zona
  const selProv = document.getElementById('f-provincia');
  selProv.disabled = true;
  selProv.innerHTML = '<option value="">Todas</option>';

  // Localidad: deshabilitada hasta que se seleccione Provincia
  const selLoc = document.getElementById('f-localidad');
  selLoc.disabled = true;
  selLoc.innerHTML = '<option value="">Todas</option>';

  populateModelos();
}

function populateModelos() {
  const marcas = [...msState.marca];
  const cil    = document.getElementById('f-cil').value;

  const filtered = RAW_DATA.filter(r =>
    (marcas.length === 0 || marcas.includes(r.marca)) &&
    (!cil || r.cilindrada === cil)
  );

  const modelos = [...new Set(filtered.map(r => r.modelo))].sort();

  // Eliminar modelos que ya no están disponibles del estado
  msState.modelo.forEach(m => {
    if (!modelos.includes(m)) msState.modelo.delete(m);
  });

  buildMsList('modelo', modelos);
  updateMsTrigger('modelo');
}

function onSelectCil() { populateModelos(); updateInsights(); }

function resetFilters() {
  msState.marca.clear();
  buildMsList('marca', msAllItems.marca);
  updateMsTrigger('marca');
  msState.modelo.clear();
  buildMsList('modelo', msAllItems.modelo);
  updateMsTrigger('modelo');
  document.getElementById('f-cil').value = '';
  document.getElementById('f-zona').value = '';
  document.getElementById('f-provincia').value = '';
  document.getElementById('f-localidad').value = '';

  // Deshabilitar provincia y localidad al limpiar filtros
  document.getElementById('f-provincia').disabled = true;
  document.getElementById('f-localidad').disabled = true;
  document.getElementById('f-provincia').innerHTML = '<option value="">Todas</option>';
  document.getElementById('f-localidad').innerHTML = '<option value="">Todas</option>';

  updateInsights();
}

// --- Sticky offsets ---
function setStickyTops() {
  const header  = document.querySelector('header');
  const nav     = document.querySelector('.nav-bar');
  const filters = document.querySelector('.filters-bar');
  const hH = header.offsetHeight, nH = nav.offsetHeight;
  nav.style.top     = hH + 'px';
  filters.style.top = (hH + nH) + 'px';
}
window.addEventListener('load',   setStickyTops);
window.addEventListener('resize', setStickyTops);

// --- Brand colors (logo-inspired) ---
const BRAND_COLORS = {
  'YAMAHA':'#1F3C88','HONDA':'#CC0000','SUZUKI':'#1A5276',
  'KAWASAKI':'#2E7D32','KTM':'#E65100','BMW':'#1C69D4',
  'BAJAJ':'#1565C0','TVS':'#B71C1C','HERO':'#880E4F',
  'BENELLI':'#6A1414','BETA':'#E65100','DUCATI':'#CC0000',
  'TRIUMPH':'#003087','ROYAL ENFIELD':'#5D4037','HARLEY-DAVIDSON':'#F57C00',
  'GILERA':'#C62828','MOTOMEL':'#1565C0','ZANELLA':'#006064',
  'CORVEN':'#37474F','GUERRERO':'#4A148C','KELLER':'#1B5E20',
  'MONDIAL':'#0D47A1','SIAM':'#4E342E','LIFAN':'#E53935',
  'LONCIN':'#00838F','JAWA':'#D32F2F',
};

function getBrandColor(marca) {
  if (BRAND_COLORS[marca.toUpperCase()]) return BRAND_COLORS[marca.toUpperCase()];
  const hue = [...marca].reduce((h,c) => h + c.charCodeAt(0)*37, 0) % 360;
  return `hsl(${hue},55%,35%)`;
}

// --- Brand logos (archivos locales en Logos/) ---

const BRAND_LOGO_FILES = {
  'YAMAHA':  'Fuentes/Logos/yamaha-logo.png',
  'HONDA':   'Fuentes/Logos/logo-honda.png',
  'KELLER':  'Fuentes/Logos/keller-logo.jfif',

};

function brandBadge(marca) {
  const hue = [...marca].reduce((h,c) => h + c.charCodeAt(0)*37, 0) % 360;
  const fs  = marca.length > 8 ? '9px' : marca.length > 5 ? '10px' : '11px';
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:230px;height:50px;border-radius:6px;background:hsl(${hue},55%,38%);color:#fff;font-size:${fs};font-weight:700;flex-shrink:0;text-align:center;padding:3px;line-height:1.2">${marca}</span>`;
}

function brandLogoHtml(marca) {
  const file = BRAND_LOGO_FILES[marca.toUpperCase()];
  if (!file) return brandBadge(marca);
  return `<img src="${file}" alt="${marca}" data-marca="${marca}"
    style="width:230px;height:auto;max-height:80px;object-fit:contain;flex-shrink:0;vertical-align:middle"
    onerror="this.outerHTML=brandBadge(this.dataset.marca)">`;
}

// --- Auto insights ---
function generateAutoInsights(allFiltered, mA, mB, lA, lB) {
  // Helpers de formato
  const nf = n => n.toLocaleString('es-AR');
  const pctStr = (a,b) => { if (!a) return b > 0 ? 'nuevo' : '—'; const p=(b-a)/a*100; return `${p>0?'+':''}${p.toFixed(0)}%`; };
  const vColor = (a,b) => b>a ? '#27ae60' : b<a ? '#e74c3c' : '#888';
  const vSpan = (a,b) => `<span style="color:${vColor(a,b)};font-weight:700">${pctStr(a,b)}</span>`;

  // ===== (1) CILINDRADA: variación de cada cilindrada =====
  const cilMap = {};
  allFiltered.forEach(r => {
    const k = r.cilindrada || 'Sin categoría';
    if (!cilMap[k]) cilMap[k] = { a:0, b:0 };
    cilMap[k].a += r[mA]||0; cilMap[k].b += r[mB]||0;
  });
  const cilOrder = ['Hasta 110 cc','111-150 cc','151-250 cc','251-500 cc','Más de 500 cc','Sin categoría'];
  const cilRows = Object.entries(cilMap)
    .map(([name,v]) => ({ name, ...v }))
    .filter(c => c.a > 0 || c.b > 0)
    .sort((x,y) => (cilOrder.indexOf(x.name)) - (cilOrder.indexOf(y.name)));
  const cilBullets = cilRows.map(c =>
    `<b>${c.name}</b>: ${nf(c.a)} → ${nf(c.b)} ${vSpan(c.a,c.b)}`);

  // ===== (4) ZONAS: variación de cada zona =====
  const zonaMap = {};
  allFiltered.forEach(r => {
    const z = r.zona;
    if (!z || z === 'RUNA') return; // ignorar vacíos y RUNA
    if (!zonaMap[z]) zonaMap[z] = { a:0, b:0 };
    zonaMap[z].a += r[mA]||0; zonaMap[z].b += r[mB]||0;
  });
  const zonaRows = Object.entries(zonaMap)
    .map(([name,v]) => ({ name, ...v }))
    .sort((x,y) => y.b - x.b);
  const zonaBullets = zonaRows.map(z =>
    `<b>${z.name}</b>: ${nf(z.a)} → ${nf(z.b)} ${vSpan(z.a,z.b)}`);

  // ===== Datos de marca para (2) =====
  const brandMap = {};
  allFiltered.forEach(r => {
    if (!brandMap[r.marca]) brandMap[r.marca] = { a:0, b:0 };
    brandMap[r.marca].a += r[mA]||0; brandMap[r.marca].b += r[mB]||0;
  });
  const brandRows = Object.entries(brandMap)
    .map(([marca,v]) => ({ marca, a:v.a, b:v.b, varAbs:v.b-v.a, varPct:v.a?(v.b-v.a)/v.a*100:null }))
    .filter(r => r.a >= 20 || r.b >= 20);
  const brandRanked = [...brandRows].sort((x,y) => y.b - x.b);
  const rankOf = {}; brandRanked.forEach((r,i) => rankOf[r.marca] = i+1);

  // Umbral mínimo: solo insights con variación >= 10 unidades (sino es imperceptible)
  const MIN_VAR = 10;

  // ===== (2) MARCAS: insights relevantes =====
  const marcaBullets = [];
  const usedBrands = new Set();
  const pushBrand = (txt, marca) => { if (!usedBrands.has(marca)) { marcaBullets.push(txt); usedBrands.add(marca); } };

  // PRIORIDAD: Marcas nuevas (0 en A, >= MIN_VAR en B) — todas las relevantes
  const bNewList = [...brandRows].filter(r => r.a === 0 && r.b >= MIN_VAR).sort((a,b) => b.b - a.b);
  bNewList.forEach(bn => pushBrand(`🆕 <b>${bn.marca}</b> debutó con ${nf(bn.b)} unid en ${lB}`, bn.marca));

  // Mayor crecimiento absoluto
  const bGain = [...brandRows].filter(r => r.varAbs >= MIN_VAR).sort((a,b) => b.varAbs - a.varAbs)[0];
  if (bGain) pushBrand(`📈 <b>${bGain.marca}</b> lideró el crecimiento: +${nf(bGain.varAbs)} unid (${pctStr(bGain.a,bGain.b)}), top ${rankOf[bGain.marca]}`, bGain.marca);
  // Mayor caída absoluta
  const bDrop = [...brandRows].filter(r => r.varAbs <= -MIN_VAR).sort((a,b) => a.varAbs - b.varAbs)[0];
  if (bDrop) pushBrand(`📉 <b>${bDrop.marca}</b> la mayor caída: ${nf(bDrop.varAbs)} unid (${pctStr(bDrop.a,bDrop.b)}), top ${rankOf[bDrop.marca]}`, bDrop.marca);
  // Outlier de crecimiento % (volumen relevante)
  const oUp = [...brandRows].filter(r => r.b >= 40 && r.varAbs >= MIN_VAR && r.varPct !== null && r.varPct >= 40).sort((a,b) => b.varPct - a.varPct)[0];
  if (oUp) pushBrand(`🚀 <b>${oUp.marca}</b> outlier: ${pctStr(oUp.a,oUp.b)} (${nf(oUp.a)}→${nf(oUp.b)} unid)`, oUp.marca);
  // Caída fuerte en top 20
  const oDown = [...brandRows].filter(r => rankOf[r.marca] <= 20 && r.varAbs <= -MIN_VAR && r.varPct !== null && r.varPct <= -25).sort((a,b) => a.varPct - b.varPct)[0];
  if (oDown) pushBrand(`⚠️ <b>${oDown.marca}</b> cayó ${pctStr(oDown.a,oDown.b)} estando en top ${rankOf[oDown.marca]}`, oDown.marca);
  // Otro crecimiento % relevante en top 20
  const oUp2 = [...brandRows].filter(r => rankOf[r.marca] <= 20 && r.varAbs >= MIN_VAR && r.varPct !== null && r.varPct >= 25).sort((a,b) => b.varPct - a.varPct).find(r => !usedBrands.has(r.marca));
  if (oUp2) pushBrand(`🟢 <b>${oUp2.marca}</b> creció ${pctStr(oUp2.a,oUp2.b)} (top ${rankOf[oUp2.marca]})`, oUp2.marca);

  // ===== Datos de modelo para (3) =====
  const modMap = {};
  allFiltered.forEach(r => {
    const k = `${r.marca}|${r.modelo}`;
    if (!modMap[k]) modMap[k] = { marca:r.marca, modelo:r.modelo, cil:r.cilindrada, a:0, b:0 };
    modMap[k].a += r[mA]||0; modMap[k].b += r[mB]||0;
  });
  const modRows = Object.values(modMap)
    .map(m => ({ ...m, varAbs:m.b-m.a, varPct:m.a?(m.b-m.a)/m.a*100:null }));

  // ===== (3) MODELOS: insights relevantes =====
  const modeloBullets = [];
  const usedModels = new Set();
  const modKey = m => `${m.marca}|${m.modelo}`;

  // PRIORIDAD: Modelos nuevos (0 en A, >= MIN_VAR en B) — hasta 5 destacados
  const mNewList = [...modRows].filter(r => r.a === 0 && r.b >= MIN_VAR).sort((a,b) => b.b - a.b).slice(0, 5);
  mNewList.forEach(mn => {
    modeloBullets.push(`🆕 <b>${mn.marca} ${mn.modelo}</b> debutó con ${nf(mn.b)} unid`);
    usedModels.add(modKey(mn));
  });

  // Mayor crecimiento absoluto
  const mGain = [...modRows].filter(r => r.varAbs >= MIN_VAR && !usedModels.has(modKey(r))).sort((a,b) => b.varAbs - a.varAbs)[0];
  if (mGain) { modeloBullets.push(`📈 <b>${mGain.marca} ${mGain.modelo}</b>: +${nf(mGain.varAbs)} unid (${pctStr(mGain.a,mGain.b)})`); usedModels.add(modKey(mGain)); }
  // Mayor caída absoluta
  const mDrop = [...modRows].filter(r => r.varAbs <= -MIN_VAR && !usedModels.has(modKey(r))).sort((a,b) => a.varAbs - b.varAbs)[0];
  if (mDrop) { modeloBullets.push(`📉 <b>${mDrop.marca} ${mDrop.modelo}</b>: ${nf(mDrop.varAbs)} unid (${pctStr(mDrop.a,mDrop.b)})`); usedModels.add(modKey(mDrop)); }
  // Modelo que desapareció
  const mGone = [...modRows].filter(r => r.a >= 30 && r.b === 0).sort((a,b) => b.a - a.a)[0];
  if (mGone) modeloBullets.push(`⛔ <b>${mGone.marca} ${mGone.modelo}</b> sin ventas en ${lB} (tenía ${nf(mGone.a)})`);
  // Cambio de posición en el ranking intra-gama: en la cilindrada de mayor volumen
  // Solo se reporta si un modelo SUPERÓ a otro en el ranking de unidades (volúmenes comparables)
  const topCil = cilRows.filter(c => c.name !== 'Sin categoría').sort((a,b) => b.b - a.b)[0];
  if (topCil) {
    // Top 10 de la gama por ventas del mes B
    const inCil = modRows.filter(r => r.cil === topCil.name && r.b > 0)
      .sort((a,b) => b.b - a.b).slice(0, 10);
    // Buscar un par que cruzó posiciones: X estaba debajo de Y en A pero arriba en B
    let swap = null;
    for (let i = 0; i < inCil.length; i++) {
      for (let j = i+1; j < inCil.length; j++) {
        const X = inCil[i], Y = inCil[j]; // X arriba de Y en B (porque está ordenado por b desc)
        if (X.a < Y.a && X.b > Y.b) {
          // X superó a Y. Preferir el cruce con menor diferencia de volumen en B (más reñido)
          const gap = Math.abs(X.b - Y.b);
          if (!swap || gap < swap.gap) swap = { up:X, down:Y, gap };
        }
      }
    }
    if (swap) {
      modeloBullets.push(`🔄 En <b>${topCil.name}</b>: ${swap.up.marca} ${swap.up.modelo} (${nf(swap.up.a)}→${nf(swap.up.b)}) superó a ${swap.down.marca} ${swap.down.modelo} (${nf(swap.down.a)}→${nf(swap.down.b)})`);
    }
  }
  // Mayor outlier % con volumen
  const mOut = [...modRows].filter(r => r.b >= 30 && r.varAbs >= MIN_VAR && r.varPct !== null && r.varPct >= 50).sort((a,b) => b.varPct - a.varPct)[0];
  if (mOut && mOut.modelo !== mGain?.modelo) modeloBullets.push(`🚀 <b>${mOut.marca} ${mOut.modelo}</b>: ${pctStr(mOut.a,mOut.b)} (${nf(mOut.a)}→${nf(mOut.b)})`);

  // ===== Render de los 4 cuadros =====
  document.getElementById('insights-title').textContent = `Resumen de novedades ${lB}`;

  const box = (title, color, bullets) => {
    const lis = bullets.slice(0,10).map(b => `<li style="margin-bottom:4px">${b}</li>`).join('') || '<li style="color:#999">Sin datos</li>';
    return `<div style="border:1px solid #e0e6f2;border-radius:8px;overflow:hidden;min-width:0">
      <div style="background:${color};color:#fff;padding:6px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">${title}</div>
      <ul style="margin:0;padding:8px 8px 8px 22px;font-size:11px;line-height:1.5;color:#1a1a2e">${lis}</ul>
    </div>`;
  };

  document.getElementById('auto-insights').innerHTML =
    box('Cilindrada', '#7b5cb8', cilBullets) +
    box('Marcas', '#4472C4', marcaBullets) +
    box('Modelos', '#2e8b57', modeloBullets) +
    box('Zonas', '#d68910', zonaBullets);
}

// --- Sort state per table ---
const sortState = {
  brands: { col: 'b', dir: 1 },
  worst:  { col: 'varPct', dir: -1 },
  best:   { col: 'varPct', dir: 1 },
};
function sortBy(table, col) {
  if (sortState[table].col === col) sortState[table].dir *= -1;
  else { sortState[table].col = col; sortState[table].dir = col === 'marca' || col === 'modelo' ? 1 : -1; }
  updateInsights();
}
function sortArr(arr, col, dir) {
  return [...arr].sort((a,b) => {
    let av = a[col] ?? -Infinity, bv = b[col] ?? -Infinity;
    if (typeof av === 'string') return dir * av.localeCompare(bv);
    return dir * (bv - av);
  });
}
function thStyle(table, col) {
  const s = sortState[table];
  return `cursor:pointer;user-select:none${s.col===col?';background:#2E5FA3':''}" onclick="sortBy('${table}','${col}')`;
}
function arrow(table, col) {
  const s = sortState[table];
  return s.col === col ? (s.dir > 0 ? ' ↑' : ' ↓') : '';
}

// --- Insights / Variaciones del mes ---
function updateInsights() {
  const mA        = document.getElementById('ins-month-a').value;
  const mB        = document.getElementById('ins-month-b').value;
  const topN      = parseInt(document.getElementById('ins-topn').value) || 10;
  const topBrands = parseInt(document.getElementById('ins-topn-brands').value) || 15;
  const minU      = parseInt(document.getElementById('ins-min').value) || 1;
  if (!mA || !mB) return;
  const lA = MONTH_LABELS[MONTHS.indexOf(mA)];
  const lB = MONTH_LABELS[MONTHS.indexOf(mB)];
  // Usar getFiltered() para que responda a TODOS los filtros
  const allFiltered = getFiltered();

  // Top N marcas
  const brandMap = {};
  allFiltered.forEach(r => {
    if (!brandMap[r.marca]) brandMap[r.marca] = { a:0, b:0 };
    brandMap[r.marca].a += r[mA]||0; brandMap[r.marca].b += r[mB]||0;
  });
  const allBrandRows = Object.entries(brandMap)
    .map(([marca,v]) => ({ marca, a:v.a, b:v.b, varAbs:v.b-v.a, varPct:v.a?(v.b-v.a)/v.a*100:null }))
    .sort((x,y) => y.b-x.b);

  // Totales del mercado completo (SIN filtro de mínimo)
  const mktA = allBrandRows.reduce((s,b)=>s+b.a,0);
  const mktB = allBrandRows.reduce((s,b)=>s+b.b,0);
  // Filas mostradas: aplica filtro de mínimo
  const brands = allBrandRows.filter(b => b.b >= minU).slice(0, topBrands);

  const sortedBrands = sortArr(brands, sortState.brands.col, sortState.brands.dir);

  document.getElementById('ins-brands-head').innerHTML = `<tr>
    <th style="text-align:center;width:28px">#</th>
    <th style="text-align:left;${thStyle('brands','marca')}">Marca${arrow('brands','marca')}</th>
    <th style="text-align:right;width:44px;${thStyle('brands','a')}">${lA}${arrow('brands','a')}</th>
    <th style="text-align:right;width:44px;${thStyle('brands','b')}">${lB}${arrow('brands','b')}</th>
    <th style="text-align:right;white-space:nowrap;${thStyle('brands','varAbs')}">Var #${arrow('brands','varAbs')}</th>
    <th style="text-align:right;white-space:nowrap;min-width:52px;${thStyle('brands','varPct')}">Var %${arrow('brands','varPct')}</th></tr>`;

  document.getElementById('ins-brands-body').innerHTML = sortedBrands.map((b,i) => {
    const cls=b.varAbs>0?'pos':b.varAbs<0?'neg':'', sign=b.varAbs>0?'+':'';
    const pct=b.varPct!==null?`${sign}${b.varPct.toFixed(0)}%`:'—';
    const color = getBrandColor(b.marca);
    return `<tr style="${b.marca==='YAMAHA'?'background:#fde8c8':''}">
      <td style="text-align:center;color:#aaa;font-size:11px">${i+1}</td>
      <td style="text-align:left;white-space:nowrap">
        <span style="display:inline-flex;align-items:center;gap:5px">
          <span style="display:inline-block;width:3px;height:16px;border-radius:2px;background:${color};flex-shrink:0"></span>
          <span style="font-weight:700;font-size:12px;color:${color}">${b.marca}</span>
        </span>
      </td>
      <td style="text-align:right">${b.a.toLocaleString('es-AR')}</td>
      <td style="text-align:right;font-weight:700">${b.b.toLocaleString('es-AR')}</td>
      <td class="${cls}" style="text-align:right">${sign}${b.varAbs.toLocaleString('es-AR')}</td>
      <td class="${cls}" style="text-align:right;font-weight:700">${pct}</td></tr>`;
  }).join('') + (() => {
    const shownA = brands.reduce((s,b)=>s+b.a,0);
    const shownB = brands.reduce((s,b)=>s+b.b,0);
    const restoA = mktA - shownA, restoB = mktB - shownB;
    const restoVar = restoA ? (restoB-restoA)/restoA*100 : null;
    const rCls = restoB>restoA?'pos':restoB<restoA?'neg':'', rSign=restoB>restoA?'+':'';
    const rPct = restoVar!==null?`${rSign}${restoVar.toFixed(0)}%`:'—';
    const mktVar = mktA ? (mktB-mktA)/mktA*100 : null;
    const mCls = mktB>mktA?'pos':mktB<mktA?'neg':'', mSign=mktB>mktA?'+':'';
    const mPct = mktVar!==null?`${mSign}${mktVar.toFixed(0)}%`:'—';
    return `
      <tr style="background:#f5f7fc;border-top:1px dashed #c8d0e0">
        <td style="text-align:center;color:#aaa;font-size:11px">—</td>
        <td style="text-align:left;font-weight:600;color:#888;font-style:italic">Resto</td>
        <td style="text-align:right;color:#888">${restoA.toLocaleString('es-AR')}</td>
        <td style="text-align:right;font-weight:700;color:#888">${restoB.toLocaleString('es-AR')}</td>
        <td class="${rCls}" style="text-align:right;color:#888">${rSign}${(restoB-restoA).toLocaleString('es-AR')}</td>
        <td class="${rCls}" style="text-align:right;font-weight:700">${rPct}</td>
      </tr>
      <tr class="total-row">
        <td style="text-align:center">—</td>
        <td style="text-align:left;font-weight:700">TOTAL</td>
        <td style="text-align:right">${mktA.toLocaleString('es-AR')}</td>
        <td style="text-align:right">${mktB.toLocaleString('es-AR')}</td>
        <td class="${mCls}" style="text-align:right">${mSign}${(mktB-mktA).toLocaleString('es-AR')}</td>
        <td class="${mCls}" style="text-align:right">${mPct}</td>
      </tr>`;
  })();

  // Modelos worst/best - AGREGADOS por marca+modelo (no por localidad)
  const modeloMap = {};
  allFiltered.forEach(r => {
    const key = `${r.marca}|${r.modelo}`;
    if (!modeloMap[key]) {
      modeloMap[key] = { marca: r.marca, modelo: r.modelo, uA: 0, uB: 0 };
    }
    modeloMap[key].uA += r[mA] || 0;
    modeloMap[key].uB += r[mB] || 0;
  });

  const results = [];
  Object.values(modeloMap).forEach(m => {
    if (m.uB < minU) return;
    const varAbs = m.uB - m.uA, varPct = m.uA ? varAbs / m.uA * 100 : null;
    results.push({ marca: m.marca, modelo: m.modelo, uA: m.uA, uB: m.uB, varAbs, varPct });
  });
  const mkHead = (tbl) => `<tr>
    <th style="text-align:center;width:24px">#</th>
    <th style="text-align:left;width:72px;max-width:72px;${thStyle(tbl,'marca')}">Marca${arrow(tbl,'marca')}</th>
    <th style="text-align:left;width:85px;max-width:85px;${thStyle(tbl,'modelo')}">Modelo${arrow(tbl,'modelo')}</th>
    <th style="text-align:right;width:40px;${thStyle(tbl,'uA')}">${lA}${arrow(tbl,'uA')}</th>
    <th style="text-align:right;width:40px;${thStyle(tbl,'uB')}">${lB}${arrow(tbl,'uB')}</th>
    <th style="text-align:right;white-space:nowrap;width:38px;${thStyle(tbl,'varAbs')}">Var #${arrow(tbl,'varAbs')}</th>
    <th style="text-align:right;white-space:nowrap;width:38px;${thStyle(tbl,'varPct')}">Var %${arrow(tbl,'varPct')}</th></tr>`;
  const mkRows = list => list.map((r,i) => {
    const cls=r.varAbs>0?'pos':r.varAbs<0?'neg':'', sign=r.varAbs>0?'+':'';
    const pct=r.varPct!==null?`${sign}${r.varPct.toFixed(0)}%`:'—';
    const color = getBrandColor(r.marca);
    return `<tr style="${r.marca==='YAMAHA'?'background:#fde8c8':''}">
      <td style="text-align:center;color:#aaa;font-size:11px">${i+1}</td>
      <td style="text-align:left;max-width:72px;overflow:hidden">
        <span style="display:inline-flex;align-items:center;gap:4px">
          <span style="display:inline-block;width:3px;height:16px;border-radius:2px;background:${color};flex-shrink:0"></span>
          <span style="font-weight:700;color:${color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${r.marca}">${r.marca}</span>
        </span>
      </td>
      <td style="text-align:left;max-width:85px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.modelo}">${r.modelo}</td>
      <td style="text-align:right">${r.uA.toLocaleString('es-AR')}</td>
      <td style="text-align:right;font-weight:700">${r.uB.toLocaleString('es-AR')}</td>
      <td class="${cls}" style="text-align:right">${sign}${r.varAbs.toLocaleString('es-AR')}</td>
      <td class="${cls}" style="text-align:right;font-weight:700">${pct}</td></tr>`;
  }).join('');
  // Backend: Ordenar TODOS los registros por la columna seleccionada (VAR % por default)
  // Frontend: Mostrar solo Top N
  const worst = sortArr(results.sort((a,b)=>(a.varPct??-Infinity)-(b.varPct??-Infinity)), sortState.worst.col, sortState.worst.dir).slice(0, topN);
  const best  = sortArr(results.sort((a,b)=>(b.varPct??-Infinity)-(a.varPct??-Infinity)), sortState.best.col,  sortState.best.dir).slice(0, topN);

  // Totales globales SIN filtro de mínimo (mismo universo que marcas)
  const allA = allFiltered.reduce((s,r)=>s+(r[mA]||0),0);
  const allB = allFiltered.reduce((s,r)=>s+(r[mB]||0),0);

  function mkTotal(list) {
    const shownA=list.reduce((s,r)=>s+r.uA,0), shownB=list.reduce((s,r)=>s+r.uB,0);
    const restoA=allA-shownA, restoB=allB-shownB;
    const rVar=restoA?(restoB-restoA)/restoA*100:null;
    const rCls=restoB>restoA?'pos':restoB<restoA?'neg':'', rSign=restoB>restoA?'+':'';
    const rPct=rVar!==null?`${rSign}${rVar.toFixed(0)}%`:'—';
    const tVar=allA?(allB-allA)/allA*100:null;
    const tCls=allB>allA?'pos':allB<allA?'neg':'', tSign=allB>allA?'+':'';
    const tPct=tVar!==null?`${tSign}${tVar.toFixed(0)}%`:'—';
    return `
      <tr style="background:#f5f7fc;border-top:1px dashed #c8d0e0">
        <td style="text-align:center;color:#aaa;font-size:11px">—</td>
        <td colspan="2" style="text-align:left;font-weight:600;color:#888;font-style:italic">Resto</td>
        <td style="text-align:right;color:#888">${restoA.toLocaleString('es-AR')}</td>
        <td style="text-align:right;font-weight:700;color:#888">${restoB.toLocaleString('es-AR')}</td>
        <td class="${rCls}" style="text-align:right;color:#888">${rSign}${(restoB-restoA).toLocaleString('es-AR')}</td>
        <td class="${rCls}" style="text-align:right;font-weight:700">${rPct}</td>
      </tr>
      <tr class="total-row">
        <td style="text-align:center">—</td><td colspan="2" style="text-align:left;font-weight:700">TOTAL</td>
        <td style="text-align:right">${allA.toLocaleString('es-AR')}</td>
        <td style="text-align:right">${allB.toLocaleString('es-AR')}</td>
        <td class="${tCls}" style="text-align:right">${tSign}${(allB-allA).toLocaleString('es-AR')}</td>
        <td class="${tCls}" style="text-align:right">${tPct}</td>
      </tr>`;
  }

  document.getElementById('ins-worst-head').innerHTML=mkHead('worst');
  document.getElementById('ins-worst-body').innerHTML=mkRows(worst)+mkTotal(worst);
  document.getElementById('ins-best-head').innerHTML =mkHead('best');
  document.getElementById('ins-best-body').innerHTML =mkRows(best)+mkTotal(best);


  generateAutoInsights(allFiltered, mA, mB, lA, lB);
}



function enableColumnResize(table) {
  if (!table || table.dataset.resizable) return;
  table.dataset.resizable = 'true';
  const ths = table.querySelectorAll('th');
  ths.forEach((th, i) => {
    if (i === ths.length - 1) return;
    const handle = document.createElement('div');
    handle.className = 'col-resize';
    th.appendChild(handle);
    handle.addEventListener('mousedown', e => {
      const nextTh = ths[i + 1];
      if (!nextTh) return;
      const startX = e.clientX;
      const startW1 = th.offsetWidth;
      const startW2 = nextTh.offsetWidth;
      const onMove = ev => {
        const delta = ev.clientX - startX;
        th.style.width = Math.max(60, startW1 + delta) + 'px';
        nextTh.style.width = Math.max(60, startW2 - delta) + 'px';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.preventDefault();
    });
  });
}

function onZoneChange() {
  const zona = document.getElementById('f-zona').value;
  const selProv = document.getElementById('f-provincia');
  const selLoc = document.getElementById('f-localidad');

  // Limpiar provincia y localidad
  selProv.value = '';
  selLoc.value = '';

  if (!zona) {
    // Si no hay zona seleccionada, deshabilitar provincia y localidad
    selProv.disabled = true;
    selLoc.disabled = true;
    selProv.innerHTML = '<option value="">Todas</option>';
    selLoc.innerHTML = '<option value="">Todas</option>';
  } else {
    // Si hay zona, habilitar provincia y mostrar solo provincias de esa zona
    selProv.disabled = false;
    selLoc.disabled = true;

    // Obtener provincias de la zona
    const provFromZona = new Set();
    if (ZONA_LOCALIDADES[zona]) {
      // Obtener localidades de la zona
      const locsInZona = ZONA_LOCALIDADES[zona];
      // Buscar qué provincias contienen esas localidades
      for (const [prov, locs] of Object.entries(PROVINCIA_LOCALIDADES)) {
        if (locs.some(l => locsInZona.includes(l))) {
          provFromZona.add(prov);
        }
      }
    }

    const provs = Array.from(provFromZona).sort();
    selProv.innerHTML = '<option value="">Todas</option>' + provs.map(p => `<option value="${p}">${p}</option>`).join('');
    selLoc.innerHTML = '<option value="">Todas</option>';
  }

  updateInsights();
}

function onProvinceChange() {
  const provincia = document.getElementById('f-provincia').value;
  const selLoc = document.getElementById('f-localidad');

  // Limpiar localidad
  selLoc.value = '';

  if (!provincia) {
    // Si no hay provincia seleccionada, deshabilitar localidad
    selLoc.disabled = true;
    selLoc.innerHTML = '<option value="">Todas</option>';
  } else {
    // Si hay provincia, habilitar localidad y mostrar solo localidades de esa provincia
    selLoc.disabled = false;
    const locs = PROVINCIA_LOCALIDADES[provincia] || [];
    selLoc.innerHTML = '<option value="">Todas</option>' + locs.map(l => `<option value="${l}">${l}</option>`).join('');
  }

  updateInsights();
}
